<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Simulator - Educational Journey</title>
    <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Life Simulator</h1>
            <p>Build your educational journey and career</p>
        </header>

        <main>
            <!-- Character Stats Section -->
            <section class="character-stats">
                <h2>Character Profile</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <label>Name:</label>
                        <span id="player-name">-</span>
                    </div>
                    <div class="stat-item">
                        <label>Age:</label>
                        <span id="player-age">18</span>
                    </div>
                    <div class="stat-item">
                        <label>Money:</label>
                        <span id="player-money">$1000</span>
                    </div>
                    <div class="stat-item">
                        <label>Education:</label>
                        <span id="player-education">None</span>
                    </div>
                    <div class="stat-item">
                        <label>Current Job:</label>
                        <span id="player-job">Unemployed</span>
                    </div>
                </div>
            </section>

            <!-- Actions Section -->
            <section class="actions">
                <h2>Actions</h2>
                <div class="action-buttons">
                    <button id="take-test-btn" class="action-btn">Take Test</button>
                    <button id="apply-jobs-btn" class="action-btn">Apply for Jobs</button>
                    <button id="study-btn" class="action-btn">Study</button>
                </div>
            </section>

            <!-- Subject Selection -->
            <section id="subject-selection" class="subject-section hidden">
                <h2>Select Subject</h2>
                <div class="subject-selection">
                    <button class="subject-btn" data-subject="science">🔬 Science</button>
                    <button class="subject-btn" data-subject="math">📐 Mathematics</button>
                    <button class="subject-btn" data-subject="history">📜 History</button>
                    <button class="subject-btn" data-subject="medicine">🩺 Medicine</button>
                    <button class="subject-btn" data-subject="law">⚖️ Law</button>
                </div>
            </section>

            <!-- Study Section -->
            <section id="study-section" class="study-section hidden">
                <h2>Study Guide</h2>
                <div class="study-guide">
                    <div class="study-guide-content" id="study-guide-content">
                        <!-- Study guide content will be inserted here -->
                    </div>
                </div>
            </section>

            <!-- Test Section -->
            <section id="test-section" class="test-section hidden">
                <h2>Test</h2>
                
                <!-- Test Progress -->
                <div class="test-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="test-progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="test-progress-text">Question 1 of 8</div>
                </div>

                <div class="test-content">
                    <div id="test-question"></div>
                    <div class="test-options">
                        <input type="text" id="test-answer" placeholder="Enter your answer">
                        <button id="submit-test-btn">Submit Answer</button>
                    </div>
                    <div id="test-result"></div>
                </div>
            </section>

            <!-- Jobs Section -->
            <section id="jobs-section" class="jobs-section hidden">
                <h2>Available Jobs</h2>
                <div id="jobs-list"></div>
            </section>
        </main>

        <!-- Save/Load Section -->
        <footer class="save-controls">
            <button id="save-btn">Save Game</button>
            <button id="load-btn">Load Game</button>
            <button id="export-btn">Export Save</button>
            <button id="import-btn">Import Save</button>
            <input type="file" id="import-file" accept=".json" style="display: none;">
        </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
